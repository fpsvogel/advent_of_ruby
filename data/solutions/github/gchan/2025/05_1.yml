---
- :name: day-05-part-1.rb
  :url: https://github.com/gchan/advent-of-code-ruby/blob/main/2025/day-05
  :solution: |-
    ranges, ids = input.split("\n\n")

    fresh = ranges
      .each_line
      .map { |line|
        line
          .split("-")
          .map(&:to_i)
          .then { Range.new(_1, _2) }
      }

    ids
      .each_line
      .map(&:to_i)
      .count { |id| fresh.any? { |range| range.include?(id) } }
      .tap { |count| puts count }
