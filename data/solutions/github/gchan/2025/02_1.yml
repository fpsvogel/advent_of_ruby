---
- :name: day-02-part-1.rb
  :url: https://github.com/gchan/advent-of-code-ruby/blob/main/2025/day-02
  :solution: |-
    ranges = input.split(?,)

    ranges.sum { |range|
      min, max = range.split(?-).map(&:to_i)

      (min..max)
        .select { |n|
          str = n.to_s
          mid = str.length / 2

          str.length.even? && str[0...mid] == str[mid..-1]
        }
        .sum
    }.tap { puts _1}
