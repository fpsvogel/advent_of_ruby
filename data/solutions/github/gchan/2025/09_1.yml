---
- :name: day-09-part-1.rb
  :url: https://github.com/gchan/advent-of-code-ruby/blob/main/2025/day-09
  :solution: |-
    tiles = input
      .split(/\n|,/)
      .map(&:to_i)
      .each_slice(2)
      .to_a

    tiles.combination(2).lazy
      .map { |(x1, y1), (x2, y2)|
        ((x1 - x2).abs + 1) * ((y1 - y2).abs + 1)
      }
      .max
      .tap { puts _1 }
